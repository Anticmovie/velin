.card{background:var(--card);border:var(--cardbd);border-radius:var(--r);padding:13px;cursor:pointer;position:relative;overflow:hidden;
opacity:0;transform:translateY(16px);animation:in .5s forwards;transition:transform .18s cubic-bezier(.2,.8,.3,1.3),border-color .18s,box-shadow .18s;box-shadow:var(--cardsh)}

.card.u3{border-color:var(--red)}.card.u3::after{content:"";position:absolute;inset:-2px;border-radius:var(--r);pointer-events:none;box-shadow:0 0 0 0 var(--redglow);animation:pulse 2.2s infinite}

.row{display:flex;align-items:center;gap:10px}

.badges{display:flex;flex-wrap:wrap;gap:5px;margin:9px 0 7px}

.mini{font-size:10px;color:var(--dim);display:flex;justify-content:space-between;margin-top:8px}.gold{color:var(--acc);font-weight:700}

.mapgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}

.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:3px}

 const najem=b.najem?fmt(b.najem)+' Kč/měs':(b.vlastnictvi==='cizi_sprava'?'cizí správa':'—');
 document.getElementById('sheet').innerHTML=`<button class="x" onclick="closeS()">✕</button>
  <div class="row"><div class="ava" style="width:62px;height:62px;font-size:33px">${ICON(b)}</div><div><h2>${name}</h2><div class="addr">📍 ${b.lokalita||''} · ${b.typ_jednotky==='apartman_2kk'?'2KK':'studio 1+kk'} · 👤×${b.kapacita||'?'}</div><div class="stars" style="margin-top:4px">${stars(b.rating||{})}</div></div><div class="lvl" style="margin-left:auto"><div class="n" style="color:${tc}">${b.score??'—'}</div><div class="l" style="color:${tc}">/100 · ${tn}</div></div></div>
  ${(b.alerty&&b.alerty.length)?`<div class="sec"><h3>🔥 Co řešit</h3><div class="todo">${b.alerty.map(a=>`<div class="al ${ALCLASS(a)}">${a}</div>`).join('')}</div></div>`:''}
  <div class="sec"><h3>📅 Kalendář & ceny (Booking + Airbnb)</h3>${calendar(key)}</div>
  <div class="sec"><h3>Atributy</h3>${attrBar('Výdělek',p.vydelek)}${attrBar('Obsazenost',p.obsazenost)}${attrBar('Cena',p.cena)}${attrBar('Hodnocení',p.hodnoceni)}<div class="verd">${b.verdikt||''}</div></div>
  <div class="sec"><h3>💰 Výdělky</h3>${svgEarn(b)}</div>
  <div class="sec"><h3>📊 Trh / konkurence</h3>${market(b)}</div>
  <div class="sec"><h3>Detaily</h3><div class="kv"><div><span>Pořadí výdělek</span><b>${b.rank?('#'+b.rank):'—'}</b></div><div><span>Nájem</span><b>${najem}</b></div><div><span>Obsazenost 60d</span><b>${b.occ60??'—'} %</b></div><div><span>Volných nocí 60d</span><b>${b.free_nights_60d??'—'}</b></div><div><span>Recenzí Booking</span><b>${(b.rating||{}).booking_recenzi||'—'}</b></div><div><span>Recenzí Airbnb</span><b>${(b.rating||{}).airbnb_recenzi||'—'}</b></div></div></div>`;
 const ov=document.getElementById('ov');ov.classList.add('on');requestAnimationFrame(()=>setTimeout(()=>ov.querySelectorAll('.attr .bar>i').forEach(el=>el.style.width=el.dataset.w+'%'),80));}
function closeS(){document.getElementById('ov').classList.remove('on');}
document.getElementById('ov').onclick=e=>{if(e.target.id==='ov')closeS();};document.addEventListener('keydown',e=>{if(e.key==='Escape')closeS();});
let SORT='akce',VIEW='seznam';const SORTERS={akce:(a,b)=>(b.urgency-a.urgency)||((a.soonest_free??999)-(b.soonest_free??999))||((b.score||0)-(a.score||0)),level:(a,b)=>(b.score||-1)-(a.score||-1),gold:(a,b)=>NET(b)-NET(a)};
function render(){DATA.byty.sort(SORTERS[SORT]);const g=document.getElementById('grid');g.innerHTML=DATA.byty.map((b,i)=>card(b,i)).join('');requestAnimationFrame(()=>setTimeout(()=>g.querySelectorAll('.bar>i').forEach(el=>el.style.width=el.dataset.w+'%'),60));}
function setSort(s){SORT=s;document.querySelectorAll('.btn[data-s]').forEach(x=>x.classList.toggle('on',x.dataset.s===s));render();}
let LAY='grid';
function setLayout(l){LAY=l;document.querySelectorAll('.btn[data-l]').forEach(x=>x.classList.toggle('on',x.dataset.l===l));
 const g=document.getElementById('grid');g.className='grid lay-'+l;render();}
function setView(v){VIEW=v;document.getElementById('vSeznam').classList.toggle('on',v==='seznam');document.getElementById('vKal').classList.toggle('on',v==='kalendar');
 document.getElementById('grid').style.display=v==='seznam'?'grid':'none';document.getElementById('cal').style.display=v==='kalendar'?'block':'none';
 document.querySelectorAll('.seznam-only').forEach(x=>x.style.display=v==='seznam'?'':'none');if(v==='kalendar')renderCal();}
function triage(){const r=DATA.byty.filter(b=>b.urgency>=3).length,o=DATA.byty.filter(b=>b.urgency===2).length,ok=DATA.byty.filter(b=>b.urgency===0).length;const soon=DATA.byty.filter(b=>b.urgency>=3&&(b.soonest_free??99)<=2).length;
 document.getElementById('triage').innerHTML=`<span class="chipT r">🔴 <b>${r}</b> hned</span>`+(soon?`<span class="chipT r">⏰ <b>${soon}</b> volno ≤2 dny</span>`:'')+`<span class="chipT o">🟠 <b>${o}</b> tlak</span><span class="chipT">✅ <b>${ok}</b> ok</span>`;}
triage();render();document.getElementById('sub').textContent=`${DATA.byty.length} apartmánů · data ${DATA.generated} · klikni na byt → kalendář + návrhy cen`;
</script></body></html>
