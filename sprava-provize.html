const dec=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function unlock(pin){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pin),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:dec(BLOB.s),iterations:BLOB.it,hash:'SHA-256'},
    km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:dec(BLOB.iv)},key,dec(BLOB.ct));
  return new TextDecoder().decode(pt);
}
async function tryPin(pin){
  try{
    const html=await unlock(pin);
    sessionStorage.setItem('velin_pin',pin);
    document.open();document.write(html);document.close();
  }catch(e){
    document.getElementById('err').textContent='Špatný PIN';
    const i=document.getElementById('pin');i.value='';i.focus();
  }
}
document.getElementById('go').onclick=()=>tryPin(document.getElementById('pin').value);
document.getElementById('pin').addEventListener('keydown',e=>{if(e.key==='Enter')tryPin(e.target.value);});
// pamatuj PIN v ramci session (refresh bez znovuzadani)
const saved=sessionStorage.getItem('velin_pin');
if(saved)tryPin(saved);
</script></body></html>
