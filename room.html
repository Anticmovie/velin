<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5"/>
<meta name="theme-color" content="#03040a"/>
<title>VELÍN · živý ekosystém</title>
<style>
  :root{--bg:#03040a;--panel:rgba(14,20,38,.74);--stroke:rgba(120,160,255,.16);--text:#eaf0ff;--muted:#8893b3;--dim:#5b6480;
    --cy:#33e1ff;--ok:#2bd980;--warn:#ffb02e;--down:#ff4d6a;--gd:#ffd34d;--na:#566087;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;font:14px/1.5 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  #stars{position:fixed;inset:0;z-index:0}
  .top{position:fixed;top:0;left:0;right:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 14px;background:linear-gradient(180deg,rgba(3,4,10,.92),transparent)}
  .brand{display:flex;align-items:center;gap:10px}
  .core{width:30px;height:30px;border-radius:50%;background:radial-gradient(circle at 50% 40%,#bdf6ff,#33e1ff 45%,#0a4f63 78%);box-shadow:0 0 16px rgba(51,225,255,.7);animation:cpulse 3s ease-in-out infinite}
  @keyframes cpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
  .ttl{font-weight:800;letter-spacing:.06em;font-size:14px}.ttl b{color:var(--cy)}
  .tsub{color:var(--muted);font-size:9px;letter-spacing:.14em;text-transform:uppercase}
  .clock{font-weight:700;font-size:14px;color:#dff3ff;font-variant-numeric:tabular-nums;text-align:right}
  .nav{position:fixed;top:9px;left:50%;transform:translateX(-50%);z-index:31;display:flex;gap:6px;background:var(--panel);border:1px solid var(--stroke);border-radius:30px;padding:4px}
  .nav a{color:var(--muted);text-decoration:none;font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:20px}
  .nav a.on{background:rgba(51,225,255,.16);color:var(--cy)}

  .stage{position:fixed;inset:46px 8px 84px;z-index:5;display:flex;align-items:center;justify-content:center}
  .scene{position:relative;width:100%;height:100%;max-width:1180px;border-radius:18px;overflow:hidden;background:radial-gradient(120% 120% at 50% 0%,rgba(20,28,52,.4),rgba(5,7,14,.62))}
  #net{position:absolute;inset:0;z-index:3;pointer-events:none}
  .room{position:absolute;z-index:1;border-radius:16px;border:1.5px solid color-mix(in srgb,var(--rc) 40%,var(--stroke));
    background:linear-gradient(180deg,color-mix(in srgb,var(--rc) 7%,rgba(12,16,30,.5)),rgba(6,9,18,.5)),repeating-linear-gradient(0deg,rgba(120,160,255,.04) 0 1px,transparent 1px 36px),repeating-linear-gradient(90deg,rgba(120,160,255,.04) 0 1px,transparent 1px 36px);
    box-shadow:inset 0 0 60px -26px var(--rc)}
  .rlabel{position:absolute;top:7px;left:12px;font-size:9.5px;font-weight:800;letter-spacing:.22em;color:color-mix(in srgb,var(--rc) 80%,#fff);z-index:2}
  .you{position:absolute;z-index:5;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
  .you .e{font-size:20px;filter:drop-shadow(0 0 8px var(--gd))}
  .you .l{font-size:9px;font-weight:800;letter-spacing:.1em;color:var(--gd);margin-top:-2px}

  .desk{position:absolute;z-index:2;transform:translate(-50%,-50%);width:56px;text-align:center;pointer-events:none}
  .desk .d{width:46px;height:22px;margin:0 auto;border-radius:6px;background:linear-gradient(180deg,rgba(40,52,86,.9),rgba(18,24,42,.9));border:1px solid color-mix(in srgb,var(--c) 45%,transparent);box-shadow:inset 0 0 14px -6px var(--c);position:relative;overflow:hidden}
  .desk .d::after{content:"";position:absolute;inset:4px 6px;border-radius:3px;background:color-mix(in srgb,var(--c) 14%,#0a0e1a);background-image:repeating-linear-gradient(180deg,color-mix(in srgb,var(--c) 30%,transparent) 0 1px,transparent 1px 4px);animation:flick 2s steps(8) infinite}
  @keyframes flick{50%{opacity:.5}}

  .char{position:absolute;z-index:6;transform:translate(-50%,-100%);will-change:left,top;cursor:pointer}
  .tag{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);margin-bottom:1px;white-space:nowrap;font-size:9.5px;font-weight:700;display:flex;align-items:center;gap:4px;padding:1px 6px;border-radius:20px;background:rgba(8,12,24,.74);border:1px solid color-mix(in srgb,var(--c) 40%,transparent)}
  .tag .lvl{font-size:8px;font-weight:800;color:var(--gd);background:rgba(255,211,77,.14);border-radius:10px;padding:0 5px}
  .tag .dt{width:5px;height:5px;border-radius:50%;background:var(--st,#2bd980);box-shadow:0 0 6px var(--st,#2bd980)}
  .body{transform:scaleX(var(--face,1));transform-origin:center bottom}
  .char.mini .body{transform:scaleX(var(--face,1)) scale(.72)}
  /* taskbar pod postavou */
  .taskbar{position:absolute;top:100%;left:50%;transform:translateX(-50%);margin-top:1px;width:78px;opacity:0;transition:opacity .2s}
  .char.work .taskbar,.char.busy .taskbar{opacity:1}
  .tlabel{font-size:8px;color:#cfe0ff;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:78px;text-shadow:0 1px 3px #000}
  .tprog{height:4px;border-radius:3px;background:rgba(255,255,255,.1);overflow:hidden;margin-top:1px;border:1px solid color-mix(in srgb,var(--c) 30%,transparent)}
  .tprog i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--c),#fff);box-shadow:0 0 8px -1px var(--c);transition:width .2s linear}
  .think{position:absolute;bottom:100%;left:64%;margin-bottom:16px;font-size:12px;opacity:0;animation:think 1.1s ease-out}
  @keyframes think{0%{opacity:0;transform:translateY(4px) scale(.6)}30%{opacity:1}100%{opacity:0;transform:translateY(-12px)}}
  .lup{position:absolute;bottom:108%;left:50%;transform:translateX(-50%);font-size:10px;font-weight:800;color:var(--gd);white-space:nowrap;text-shadow:0 0 8px var(--gd);opacity:0;animation:lup 1.6s ease-out}
  @keyframes lup{0%{opacity:0;transform:translate(-50%,6px)}20%{opacity:1}100%{opacity:0;transform:translate(-50%,-22px)}}
  svg.fig{width:54px;height:64px;overflow:visible;display:block}
  .figg{animation:idle 2.6s ease-in-out infinite;transform-origin:50% 90%}@keyframes idle{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
  .char.walk .figg{animation:walk .4s ease-in-out infinite}@keyframes walk{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-4px) rotate(4deg)}}
  .char.work .arm{animation:type .3s ease-in-out infinite}@keyframes type{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}
  .char.alarm .figg{animation:shake .25s infinite}@keyframes shake{0%,100%{transform:translateX(0)}50%{transform:translateX(2px)}}
  .eye{transform-box:fill-box;transform-origin:center;animation:blink 3.6s infinite}@keyframes blink{0%,93%,100%{transform:scaleY(1)}96%{transform:scaleY(.1)}}
  .arm{transform-box:fill-box;transform-origin:top center}

  /* proces ticker */
  .ticker{position:fixed;bottom:0;left:0;right:0;z-index:26;height:74px;background:linear-gradient(0deg,rgba(3,4,10,.95),rgba(3,4,10,.6));border-top:1px solid var(--stroke);padding:7px 14px;overflow:hidden}
  .ticker h5{margin:0 0 4px;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:7px}
  .ticker h5::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok);animation:blinkd 1.2s infinite}
  @keyframes blinkd{50%{opacity:.35}}
  .tk{font-size:11.5px;line-height:1.5;color:#cfe0ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tk b{color:#fff}.tk .ld{color:var(--cy)}

  .scrim{position:fixed;inset:0;z-index:40;background:rgba(2,3,8,.6);backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:.25s}.scrim.on{opacity:1;pointer-events:auto}
  .panel{position:fixed;top:0;right:0;bottom:0;z-index:41;width:min(420px,92vw);transform:translateX(100%);transition:transform .3s cubic-bezier(.3,.8,.3,1);background:linear-gradient(180deg,rgba(16,22,42,.98),rgba(7,10,20,.98));border-left:1px solid color-mix(in srgb,var(--c,#33e1ff) 40%,transparent);box-shadow:-30px 0 80px -30px #000;overflow-y:auto;padding:22px}
  .panel.on{transform:none}.panel .x{position:absolute;top:14px;right:16px;color:var(--muted);font-size:23px;cursor:pointer}
  .phead{display:flex;align-items:center;gap:14px}.pav{width:60px;height:68px;flex-shrink:0;display:flex;align-items:flex-end;justify-content:center}
  .pn{font-weight:800;font-size:19px}.prole{font-size:12px;font-weight:600}
  .rank{display:inline-flex;align-items:center;gap:6px;margin-top:7px;font-size:11px;font-weight:800;letter-spacing:.05em;padding:4px 11px;border-radius:20px;background:rgba(255,211,77,.14);color:var(--gd);border:1px solid rgba(255,211,77,.3)}
  .expw{margin-top:12px}.expw .r{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px}.expw .r b{color:var(--text)}
  .expbar{height:9px;border-radius:6px;background:rgba(255,255,255,.08);overflow:hidden;border:1px solid var(--stroke)}
  .expbar i{display:block;height:100%;background:linear-gradient(90deg,var(--gd),#fff);box-shadow:0 0 10px -1px var(--gd)}
  .pst{display:inline-flex;align-items:center;gap:6px;margin:12px 0;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:4px 11px;border-radius:20px}
  .psec{margin-top:14px}.psec h4{margin:0 0 6px;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}.psec p{margin:0;color:#cdd6ee;font-size:13.5px;line-height:1.55}
  .stat2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}.stat2 div{background:rgba(255,255,255,.03);border:1px solid var(--stroke);border-radius:10px;padding:8px 10px}
  .stat2 .k{font-size:10px;color:var(--muted)}.stat2 .v{font-size:16px;font-weight:800}
  .pchips{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px}.pchip{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--stroke);background:rgba(255,255,255,.04);color:var(--muted)}.pchip b{color:var(--text)}
  @media(max-width:560px){.nav{display:none}.stage{inset:44px 4px 78px}svg.fig{width:44px;height:52px}.ttl{font-size:12px}.rlabel{font-size:8px}}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="top"><div class="brand"><div class="core"></div><div><div class="ttl">VEL<b>Í</b>N · ekosystém</div><div class="tsub" id="sysl">…</div></div></div><div class="clock" id="clock">--:--:--</div></div>
<div class="nav"><a href="index.html">Přehled</a><a class="on" href="room.html">Ekosystém</a></div>
<div class="stage"><div class="scene" id="scene"><canvas id="net"></canvas></div></div>
<div class="ticker"><h5>Procesy · samo-zlepšování</h5><div class="tk" id="tk1">…</div><div class="tk" id="tk2"></div></div>

<div class="panel" id="panel"><span class="x" onclick="closePanel()">✕</span><div id="pbody"></div></div>

<script src="data.js"></script>
<script>
(function(){
  var D=window.DASHBOARD_DATA||{};
  var esc=function(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});};
  var STC={operational:'#2bd980',wip:'#ffb02e',down:'#ff4d6a',planned:'#3b9dff',na:'#566087'};
  var RANKS=[{l:1,n:'Nováček',i:'•'},{l:3,n:'Operátor',i:'◆'},{l:6,n:'Specialista',i:'★'},{l:10,n:'Veterán',i:'✦'},{l:15,n:'Velmistr',i:'♛'}];
  function rankOf(lvl){var r=RANKS[0];for(var i=0;i<RANKS.length;i++)if(lvl>=RANKS[i].l)r=RANKS[i];return r;}

  var ROOMS={velin:{x:.02,y:.05,w:.60,h:.92,name:'VELÍN',rc:'#33e1ff'},apt:{x:.645,y:.05,w:.335,h:.56,name:'APARTMÁNY',rc:'#0ea5e9'},biz:{x:.645,y:.64,w:.335,h:.33,name:'BYZNYSY',rc:'#9b6dff'}};
  var CHAR={
    velitel:{title:'Šéf velínu',acc:'crown',home:[.5,.26],best:'koordinaci',per:'Sebere, co parta dokázala, a pošle ti souhrn. Nervózní, když něco spadne.',tasks:['Sbírám reporty agentů','Skládám denní digest','Hlídám, jestli něco nespadlo','Zadávám úkol agentovi']},
    adam:{title:'Strážce Gitu',acc:'glasses',home:[.22,.36],best:'pořádku v kódu',per:'Puntičkář. Hlídá změny a hledá, co vylepšit.',tasks:['Kontroluji git stav','Hledám necommitnuté změny','Hledám jak vylepšit cenového bota','Navrhuji zlepšení časů příjezdů','Píšu návrh do PROPOSALS']},
    klara:{title:'Štít',acc:'shield',home:[.78,.36],best:'bezpečnosti',per:'Ostražitá. Loví zranitelnosti.',tasks:['Audit závislostí','Hledám zranitelnosti','Kontroluji lockfile','Navrhuji upgrade balíčků']},
    viktor:{title:'Tester',acc:'hat',home:[.26,.72],best:'kvalitě',per:'Neúnavný. Všechno musí projít testy.',tasks:['Spouštím testy 22/22','Píšu chybějící test','Ověřuji build','Kontroluji regrese']},
    tereza:{title:'Organizátorka',acc:'pad',home:[.74,.72],best:'pořádku v úkolech',per:'Miluje seznamy a priority.',tasks:['Třídím TODO','Stanovuji priority','Hledám FIXME v kódu']},
    nina:{title:'Dispečerka',acc:'headset',home:[.5,.86],best:'provozu',per:'Klid v jádru. Hlídá n8n 24/7.',tasks:['Pinguji n8n na Railway','Kontroluji běhy workflow','Hlídám výpadky','Restartuji při pádu']}
  };
  var BOT={
    uklidovy:{nick:'Úkliďák',acc:'',home:[.28,.36],best:'pořádku',per:'Pořádkumil. Rozesílá rozpis úklidů.',tasks:['Čtu iCaly odjezdů','Skládám rozpis úklidů','Posílám do skupiny']},
    prijezdovy:{nick:'Příjezďák',acc:'',home:[.7,.36],best:'přesných časech',per:'Vítač. Scanuje maily a hlásí časy.',tasks:['Scanuji Booking maily','Hledám čas příjezdu','Kotvím na byt+datum','Posílám digest']},
    hlidaci:{nick:'Hlídač',acc:'shield',home:[.28,.74],best:'spolehlivosti',per:'Ostraha. Drží n8n naživu.',tasks:['Ping n8n','Kontroluji uptime','Hlídám restart']},
    cenovy:{nick:'Ceňák',acc:'',home:[.7,.74],best:'obsazenosti',per:'Kupec. Hlídá volné dny a ceny.',tasks:['Čtu iCaly všech bytů','Počítám volná okna','Hledám orphan gapy','Posílám cenový report']}
  };
  var SUPER={velitel:['adam','klara','viktor','tereza','nina'],adam:['prijezdovy','cenovy'],nina:['hlidaci'],tereza:['uklidovy']};

  // EXP store
  var EXP={};try{EXP=JSON.parse(localStorage.getItem('velin_exp')||'{}');}catch(e){}
  function ex(id){if(!EXP[id])EXP[id]={lvl:1+Math.floor(Math.random()*4),exp:Math.floor(Math.random()*50)};return EXP[id];}
  function need(lvl){return 60+lvl*25;}
  function save(){try{localStorage.setItem('velin_exp',JSON.stringify(EXP));}catch(e){}}

  function light(h){return 'color-mix(in srgb,'+h+' 55%, #fff)';}
  function acc(t,c){if(t==='crown')return '<path d="M28 16 L33 23 L40 14 L47 23 L52 16 L50 26 L30 26 Z" fill="#ffd34d" stroke="#b8860b"/>';
    if(t==='glasses')return '<g stroke="'+c+'" stroke-width="2.2" fill="rgba(255,255,255,.15)"><circle cx="34.5" cy="31" r="5"/><circle cx="45.5" cy="31" r="5"/><line x1="39.5" y1="31" x2="40.5" y2="31"/></g>';
    if(t==='shield')return '<path d="M58 42 L66 45 V52 C66 58 62 62 58 64 C54 62 50 58 50 52 V45 Z" fill="'+c+'" opacity=".9" stroke="#fff"/>';
    if(t==='hat')return '<g><rect x="26" y="20" width="28" height="4" rx="2" fill="#ffb02e"/><path d="M31 21 Q40 8 49 21 Z" fill="#ffb02e" stroke="#a86a00"/></g>';
    if(t==='pad')return '<g transform="translate(53,40)"><rect width="14" height="18" rx="2" fill="#fff" stroke="'+c+'" stroke-width="1.4"/><rect x="4" y="-3" width="6" height="5" rx="1.5" fill="'+c+'"/><line x1="3" y1="6" x2="11" y2="6" stroke="'+c+'" stroke-width="1.3"/><line x1="3" y1="10" x2="11" y2="10" stroke="'+c+'" stroke-width="1.3"/></g>';
    if(t==='headset')return '<g stroke="'+c+'" stroke-width="2.4" fill="none"><path d="M27 30 Q40 12 53 30"/></g><circle cx="27" cy="32" r="3" fill="'+c+'"/><circle cx="53" cy="32" r="3" fill="'+c+'"/><path d="M27 35 Q24 42 32 43" stroke="'+c+'" stroke-width="2" fill="none"/><circle cx="33" cy="43" r="2" fill="'+c+'"/>';return '';}
  function fig(c,a){var L=light(c);return '<svg class="fig" viewBox="0 0 80 80"><g class="figg">'+
    '<rect x="26" y="42" width="28" height="32" rx="14" fill="'+c+'"/><ellipse cx="40" cy="58" rx="8" ry="11" fill="rgba(255,255,255,.13)"/>'+
    '<ellipse cx="33" cy="76" rx="6" ry="3.5" fill="'+c+'"/><ellipse cx="47" cy="76" rx="6" ry="3.5" fill="'+c+'"/>'+
    '<rect class="arm" x="20" y="46" width="6.5" height="17" rx="3.2" fill="'+c+'"/><rect class="arm" x="53.5" y="46" width="6.5" height="17" rx="3.2" fill="'+c+'"/>'+
    '<rect x="28" y="20" width="24" height="24" rx="11" fill="'+L+'"/>'+
    '<ellipse class="eye" cx="35" cy="31" rx="2.5" ry="3.5" fill="#10131c"/><ellipse class="eye" cx="45" cy="31" rx="2.5" ry="3.5" fill="#10131c" style="animation-delay:.15s"/>'+
    '<circle cx="36" cy="30" r="1" fill="#fff"/><circle cx="46" cy="30" r="1" fill="#fff"/>'+
    '<path d="M37 37 Q40 39.5 43 37" stroke="#10131c" stroke-width="1.5" fill="none" stroke-linecap="round"/>'+acc(a,c)+'</g></svg>';}

  var cv=document.getElementById('stars'),cx2=cv.getContext('2d'),st=[];
  function rsz(){cv.width=innerWidth;cv.height=innerHeight;}rsz();addEventListener('resize',rsz);
  for(var i=0;i<100;i++)st.push({x:Math.random(),y:Math.random(),z:Math.random()*.8+.2,s:Math.random()*1.5+.3});
  (function bg(){cx2.clearRect(0,0,cv.width,cv.height);for(var i=0;i<st.length;i++){var p=st[i];p.y+=0.00012*p.z;if(p.y>1)p.y=0;cx2.globalAlpha=.3+p.z*.6;cx2.fillStyle=p.z>.7?'#bfe9ff':'#9fb4e0';cx2.beginPath();cx2.arc(p.x*cv.width,p.y*cv.height,p.s,0,7);cx2.fill();}requestAnimationFrame(bg);})();
  function tick(){var d=new Date(),p=function(n){return(n<10?'0':'')+n;};document.getElementById('clock').textContent=p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());}tick();setInterval(tick,1000);

  var scene=document.getElementById('scene'),net=document.getElementById('net'),nc=net.getContext('2d'),W=0,Hh=0,actors=[],byId={},youPos={x:0,y:0};
  function dim(){W=scene.clientWidth;Hh=scene.clientHeight;net.width=W;net.height=Hh;}
  function rabs(rk){var r=ROOMS[rk];return{x:r.x*W,y:r.y*Hh,w:r.w*W,h:r.h*Hh};}
  function rand(a,b){return a+Math.random()*(b-a);}

  var ch=D.chief;if(ch){ch._id='velitel';ch._kind='chief';}
  var crew=[];if(ch)crew.push(ch);(D.agents||[]).forEach(function(a){a._kind='tech';crew.push(a);});
  var aptB=(D.businesses||[]).filter(function(b){return b.id==='apartmany';})[0];var bots=aptB?(aptB.agents||[]):[];
  var otherBiz=(D.businesses||[]).filter(function(b){return b.id!=='apartmany';});

  function mkChar(a,meta,rk,mini){
    var r=rabs(rk);var c=a.accent||a.color||'#33e1ff';var id=(a.id||a._id||'').toLowerCase();
    var hx=r.x+meta.home[0]*r.w,hy=r.y+meta.home[1]*r.h;var e=ex(id);
    var d=document.createElement('div');d.className='desk';d.style.left=hx+'px';d.style.top=(hy+(mini?18:24))+'px';d.style.setProperty('--c',c);d.innerHTML='<div class="d"></div>';scene.appendChild(d);
    var el=document.createElement('div');el.className='char work'+(mini?' mini':'');el.style.setProperty('--c',c);el.style.setProperty('--st',STC[a.status||'operational']);
    var nm=mini?(meta.nick||a.name):a.name;
    el.innerHTML='<div class="tag"><span class="lvl">Lv'+e.lvl+'</span><span class="dt"></span>'+esc(nm)+'</div><div class="body">'+fig(c,meta.acc)+'</div>'+
      '<div class="taskbar"><div class="tlabel"></div><div class="tprog"><i></i></div></div>';
    scene.appendChild(el);a._meta=meta;a._mini=mini;a._id2=id;el.addEventListener('click',function(){openAgent(a);});
    var o={a:a,id:id,el:el,room:r,c:c,x:hx,y:hy,hx:hx,hy:hy,tx:hx,ty:hy,state:'work',phase:'',face:1,alarm:(a.status==='down'),task:'',tStart:0,tDur:0,
      tlabel:el.querySelector('.tlabel'),tprog:el.querySelector('.tprog i'),lvlEl:el.querySelector('.lvl')};
    actors.push(o);byId[id]=o;startTask(o,performance.now());
  }
  function startTask(o,ts){var pool=(o.a._meta.tasks)||['pracuji'];o.task=pool[Math.floor(Math.random()*pool.length)];o.tStart=ts;o.tDur=rand(4500,9000);o.tlabel.textContent=o.task;o.el.classList.add('work');o.el.classList.remove('walk');}
  function completeTask(o,ts){var e=ex(o.id);e.exp+=Math.floor(rand(10,22));var up=false;while(e.exp>=need(e.lvl)){e.exp-=need(e.lvl);e.lvl++;up=true;}save();
    if(up){o.lvlEl.textContent='Lv'+e.lvl;var l=document.createElement('div');l.className='lup';l.textContent='LEVEL UP! '+rankOf(e.lvl).n;o.el.appendChild(l);setTimeout(function(){l.remove();},1600);pushTk('🎖️ <b>'+esc(o.a._mini?o.a._meta.nick:o.a.name)+'</b> postoupil na <b>Lv'+e.lvl+' · '+rankOf(e.lvl).n+'</b>');}
    think(o,'✓');
    // obcas zaloguj samo-zlepseni
    if(/vylepšit|zlepšení|návrh|PROPOSALS/i.test(o.task))pushTk('🔧 <b>'+esc(o.a.name)+'</b>: '+esc(o.task)+' <span class="ld">→ otestováno → návrh</span>');
  }
  function place(o){o.el.style.left=o.x+'px';o.el.style.top=o.y+'px';o.el.querySelector('.body').style.setProperty('--face',o.face);if(o.alarm)o.el.classList.add('alarm');}
  function wander(o){var r=o.room,m=22;o.tx=rand(r.x+m,r.x+r.w-m);o.ty=rand(r.y+m+8,r.y+r.h-m);o.state='walk';o.phase='out';}
  var lastThink=0;function think(o,sym){var now=performance.now();if(now-lastThink<900)return;lastThink=now;var t=document.createElement('div');t.className='think';t.textContent=sym||['💡','⚙️','📊','🔧','📁','🔍'][Math.floor(Math.random()*6)];o.el.appendChild(t);setTimeout(function(){t.remove();},1100);}

  var tkBuf=[];function pushTk(html){tkBuf.unshift(html);if(tkBuf.length>2)tkBuf.pop();document.getElementById('tk1').innerHTML=tkBuf[0]||'';document.getElementById('tk2').innerHTML=tkBuf[1]||'';}

  function build(){
    dim();[].slice.call(scene.querySelectorAll('.char,.desk,.room,.you')).forEach(function(e){e.remove();});actors=[];byId={};
    for(var k in ROOMS){var r=ROOMS[k];var rd=document.createElement('div');rd.className='room';rd.style.setProperty('--rc',r.rc);rd.style.left=(r.x*W)+'px';rd.style.top=(r.y*Hh)+'px';rd.style.width=(r.w*W)+'px';rd.style.height=(r.h*Hh)+'px';rd.innerHTML='<div class="rlabel">'+r.name+'</div>';scene.appendChild(rd);}
    // TY (Pavel) nahore nad velinem
    var vr=rabs('velin');youPos={x:vr.x+vr.w*.5,y:vr.y+14};var you=document.createElement('div');you.className='you';you.style.left=youPos.x+'px';you.style.top=youPos.y+'px';you.innerHTML='<div class="e">🧑‍✈️</div><div class="l">TY · PAVEL</div>';scene.appendChild(you);
    crew.forEach(function(a){mkChar(a,CHAR[(a.id||a._id||'').toLowerCase()]||{home:[.5,.5],tasks:[],acc:''},'velin',false);});
    bots.forEach(function(a){mkChar(a,BOT[(a.id||'').toLowerCase()]||{home:[.5,.5],tasks:[],acc:'',nick:a.name},'apt',true);});
    var br=rabs('biz');otherBiz.forEach(function(b,i){var n=otherBiz.length;var bx=br.x+(n>1?(.2+.6*(i/(n-1))):.5)*br.w,by=br.y+br.h*.55;
      var el=document.createElement('div');el.className='char';el.style.setProperty('--c',b.color||'#9b6dff');el.style.left=bx+'px';el.style.top=by+'px';
      el.innerHTML='<div class="tag"><span class="dt" style="--st:'+(b.agents&&b.agents.length?'#2bd980':'#566087')+'"></span>'+esc(b.name)+'</div><div class="body"><div style="font-size:28px;filter:drop-shadow(0 4px 8px #000)">'+(b.emoji||'■')+'</div></div>';
      b._kind='biz';el.addEventListener('click',function(){openBiz(b);});scene.appendChild(el);});
    actors.forEach(place);
  }

  var SPEED=70,nextMeet=performance.now()+rand(20000,32000),meet=null,meetEnd=0,dash=0;
  function drawNet(){nc.clearRect(0,0,W,Hh);dash=(dash+.6)%16;
    function line(ax,ay,bx,by,col){nc.save();nc.strokeStyle=col;nc.globalAlpha=.5;nc.lineWidth=1.4;nc.setLineDash([5,11]);nc.lineDashOffset=-dash;nc.beginPath();nc.moveTo(ax,ay);nc.lineTo(bx,by);nc.stroke();
      nc.globalAlpha=.9;nc.setLineDash([]);nc.fillStyle=col;nc.beginPath();nc.arc(bx,by-26,2.2,0,7);nc.fill();nc.restore();}
    // ty -> velitel
    var v=byId.velitel;if(v)line(youPos.x,youPos.y+10,v.x,v.y-26,'#ffd34d');
    for(var s in SUPER){var so=byId[s];if(!so)continue;SUPER[s].forEach(function(t){var to=byId[t];if(to)line(so.x,so.y-24,to.x,to.y-24,so.c);});}
  }
  function loop(ts){if(!loop.p)loop.p=ts;var dt=Math.min(50,ts-loop.p);loop.p=ts;
    if(!meet&&ts>nextMeet){meet='gather';var r=rabs('velin');crew.forEach(function(a,i){var o=byId[(a.id||a._id||'').toLowerCase()];if(!o)return;var ang=i/crew.length*6.28;o.tx=r.x+r.w*.5+Math.cos(ang)*r.w*.15;o.ty=r.y+r.h*.42+Math.sin(ang)*r.h*.15;o.state='walk';o.phase='meet';});pushTk('👑 <b>Velitel</b> svolal poradu posádky');}
    actors.forEach(function(o){
      if(o.state==='walk'){var dx=o.tx-o.x,dy=o.ty-o.y,dist=Math.hypot(dx,dy);
        if(dist>2){var mv=SPEED*dt/1000;o.x+=dx/dist*Math.min(mv,dist);o.y+=dy/dist*Math.min(mv,dist);o.face=dx<-.5?-1:(dx>.5?1:o.face);o.el.classList.add('walk');o.el.classList.remove('work');}
        else{o.el.classList.remove('walk');if(o.phase==='meet')o.state='meet';else if(o.phase==='out'){o.state='idle';o.iuntil=ts+rand(1000,2400);}else{o.state='work';startTask(o,ts);}}
      }else if(o.state==='work'){var pr=Math.min(1,(ts-o.tStart)/o.tDur);o.tprog.style.width=(pr*100)+'%';
        if(pr>=1){completeTask(o,ts);if(Math.random()<.45)wander(o);else startTask(o,ts);}
      }else if(o.state==='idle'){if(ts>o.iuntil){o.tx=o.hx;o.ty=o.hy;o.state='walk';o.phase='back';}}
      place(o);});
    if(meet==='gather'&&crew.every(function(a){var o=byId[(a.id||a._id||'').toLowerCase()];return !o||o.state==='meet';})){meet='hold';meetEnd=ts+4800;}
    if(meet==='hold'&&ts>meetEnd){meet=null;nextMeet=ts+rand(22000,38000);crew.forEach(function(a){var o=byId[(a.id||a._id||'').toLowerCase()];if(o){o.tx=o.hx;o.ty=o.hy;o.state='walk';o.phase='back';}});}
    drawNet();requestAnimationFrame(loop);}
  build();requestAnimationFrame(loop);
  var rt;addEventListener('resize',function(){clearTimeout(rt);rt=setTimeout(build,250);});
  pushTk('⚙️ Ekosystém spuštěn · agenti hledají, jak být nejlepší…');
  // periodicky samo-prompt do tickeru
  var IMP=['🔧 <b>Adam</b>: hledám jak vylepšit <b>Příjezďáka</b> na přesnost časů <span class="ld">→ návrh → test 22/22</span>','🔧 <b>Adam</b>: zlepšení <b>Ceňáka</b> — vizualizace do Telegramu <span class="ld">→ loading…</span>','👑 <b>Velitel</b> → <b>Viktor</b>: ověř testy před nasazením','📡 <b>Nina</b>: n8n OK · 0 výpadků','🛡️ <b>Hlídač</b>: ping n8n 200 OK'];
  setInterval(function(){pushTk(IMP[Math.floor(Math.random()*IMP.length)]);},6500);

  var dn=(D.businesses||[]).reduce(function(s,b){return s+((b.agents||[]).filter(function(a){return a.status==='down';}).length);},0);
  document.getElementById('sysl').innerHTML=(dn?'⚠️ '+dn+' alarm':'✅ všichni makají')+' · hierarchie: TY → Velitel → agenti → boti';

  var scrim=document.getElementById('scrim'),panel=document.getElementById('panel');
  window.closePanel=function(){scrim.classList.remove('on');panel.classList.remove('on');};
  function open(html,c){document.getElementById('pbody').innerHTML=html;panel.style.setProperty('--c',c||'#33e1ff');scrim.classList.add('on');panel.classList.add('on');}
  window.openAgent=function(a){var c=a.accent||a.color||'#33e1ff';var m=a._meta||{};var id=a._id2||'';var e=ex(id);var rk=rankOf(e.lvl);var isVel=a._kind==='chief';
    var util=Math.min(99,38+e.lvl*7);var col=STC[a.status||'operational'];
    var sup=SUPER[id]||[];var watchedBy=Object.keys(SUPER).filter(function(k){return SUPER[k].indexOf(id)>=0;});
    open('<div class="phead"><div class="pav">'+fig(c,m.acc||'')+'</div><div><div class="pn">'+esc(a._mini?(m.nick||a.name):a.name)+'</div><div class="prole" style="color:'+c+'">'+esc(m.title||a.role||'')+'</div>'+
      '<div class="rank">'+rk.i+' '+rk.n+' · Lv'+e.lvl+'</div></div></div>'+
      '<div class="expw"><div class="r"><span>EXP</span><b>'+e.exp+' / '+need(e.lvl)+'</b></div><div class="expbar"><i style="width:'+(e.exp/need(e.lvl)*100)+'%"></i></div></div>'+
      '<div class="pst" style="background:color-mix(in srgb,'+col+' 16%,transparent);color:'+col+'"><span style="width:7px;height:7px;border-radius:50%;background:currentColor;display:inline-block"></span>'+(isVel?'VELITEL · KOORDINÁTOR':(a.status==='wip'?'LADÍ SE':a.status==='down'?'ALARM':'ONLINE · PRACUJE'))+'</div>'+
      '<div class="psec"><h4>Účel — chce být nejlepší v</h4><p>'+esc(m.best||a.role||'své práci')+'</p></div>'+
      (m.per?'<div class="psec"><h4>Povaha</h4><p>'+esc(m.per)+'</p></div>':'')+
      '<div class="stat2"><div><div class="k">Hodnost</div><div class="v" style="color:var(--gd)">'+rk.i+'</div></div><div><div class="k">Využití</div><div class="v" style="color:'+c+'">'+util+'%</div></div></div>'+
      ((sup.length||watchedBy.length)?'<div class="psec"><h4>Hierarchie</h4><p>'+(watchedBy.length?'Hlídá ho: <b>'+watchedBy.map(function(x){return cap(x);}).join(', ')+'</b><br>':'')+(sup.length?'Dohlíží na: <b>'+sup.map(function(x){return cap(x);}).join(', ')+'</b>':'')+'</p></div>':'')+
      (a.interval||a.workflow?'<div class="psec"><h4>Parametry</h4><div class="pchips">'+[a.interval?'⏱ <b>'+esc(a.interval)+'</b>':'',a.workflow?'⚙️ '+esc(a.workflow):'',a.chat?'💬 '+esc(a.chat):''].filter(Boolean).map(function(x){return '<span class="pchip">'+x+'</span>';}).join('')+'</div></div>':''),c);};
  function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
  window.openBiz=function(b){var c=b.color||'#33e1ff';var ags=b.agents||[];
    var body='<div class="phead"><div class="pav" style="font-size:28px;align-items:center">'+(b.emoji||'■')+'</div><div><div class="pn">'+esc(b.name)+'</div><div class="prole" style="color:'+c+'">byznys · '+ags.length+' agentů</div></div></div>';
    if(!ags.length)body+='<div class="psec"><p>'+esc(b.note||'K doplnění.')+'</p></div>';
    else body+='<div class="psec"><h4>Agenti</h4>'+ags.map(function(a){var col=STC[a.status]||'#566087';return '<div style="display:flex;align-items:center;gap:10px;padding:9px;border-radius:11px;margin:5px 0;background:rgba(255,255,255,.03);border:1px solid var(--stroke)"><span style="font-size:18px">'+(a.emoji||'🤖')+'</span><div><div style="font-weight:600;font-size:13px">'+esc(a.name)+'</div><div style="color:var(--muted);font-size:11px">'+esc(a.role||'')+'</div></div><span style="margin-left:auto;width:9px;height:9px;border-radius:50%;background:'+col+'"></span></div>';}).join('')+'</div>';
    open(body,c);};
})();
</script>
</body>
</html>
